<script>
        // Particle Effect Generator
        function createParticles() {
            const container = document.getElementById('particle-container');
            const colors = ['#ff9f66', '#c6e9c7', '#f2e0ca', '#ffdbc9'];
            const particleCount = 24;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const size = Math.random() * 8 + 4;
                const color = colors[Math.floor(Math.random() * colors.length)];
                
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.backgroundColor = color;
                particle.style.opacity = Math.random() * 0.4 + 0.2;
                
                // Random position
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * 100}%`;
                
                // Animation
                const duration = Math.random() * 10 + 10;
                const delay = Math.random() * 5;
                
                particle.animate([
                    { transform: 'translate(0, 0) rotate(0deg)', opacity: 0 },
                    { transform: `translate(${Math.random() * 100 - 50}px, ${Math.random() * -200}px) rotate(${Math.random() * 360}deg)`, opacity: 0.5 },
                    { transform: `translate(${Math.random() * 200 - 100}px, ${Math.random() * -400}px) rotate(${Math.random() * 720}deg)`, opacity: 0 }
                ], {
                    duration: duration * 1000,
                    iterations: Infinity,
                    delay: delay * 1000,
                    easing: 'ease-in-out'
                });

                container.appendChild(particle);
            }
        }

        // Initialize particles on load
        window.addEventListener('DOMContentLoaded', createParticles);

        // Micro-interaction for Stats Cards
        document.querySelectorAll('.bg-surface-container-low').forEach(card => {
            card.addEventListener('mouseenter', () => {
                card.style.transform = 'translateY(-4px)';
                card.style.boxShadow = '0 12px 20px -8px rgba(148, 74, 24, 0.08)';
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'translateY(0)';
                card.style.boxShadow = 'none';
            });
        });
    </script>
